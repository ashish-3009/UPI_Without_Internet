# Server
server.port=${PORT:8080}

# Database. Render overrides these with SPRING_DATASOURCE_* env vars.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:upimesh;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

# Logging
logging.level.com.demo.upimesh=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Idempotency window (how long a packet hash is remembered)
upi.mesh.idempotency-ttl-seconds=86400

# Packet freshness window — anything older than this is rejected as replay
upi.mesh.packet-max-age-seconds=86400
